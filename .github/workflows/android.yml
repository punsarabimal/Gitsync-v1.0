name: Android CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: uses/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    # 1. Repository එකේ gradlew නැති නිසා, මෙතනදී අලුතින්ම Gradle Wrapper එකක් සකස් කරනවා
    # (ඔබේ project එකේ gradle version එකට ගැලපෙන ලෙස 8.4 අනුව සකසා ඇත)
    - name: Setup Gradle Wrapper
      run: gradle wrapper --gradle-version 8.4

    # 2. අලුතින් හැදුනු gradlew එකට permission ලබා දීම
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 3. Gemini API Key එක සමඟ ඇප් එක Build කිරීම
    - name: Build with Gradle
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: ./gradlew assembleDebug --no-daemon

    # 4. ජනනය වන APK එක Artifact එකක් ලෙස Save කිරීම
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Gitsync-v1.0-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
